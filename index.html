<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMind AI 📚</title>
    <!-- استدعاء مكتبة Tailwind CSS للتصميم الاحترافي -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-slate-100">
        <!-- العنوان -->
        <h1 class="text-3xl font-bold text-blue-700 mb-2 flex items-center justify-center gap-2">
            StudyMind AI 📚
        </h1>
        <p class="text-slate-500 text-sm mb-6">مساعدك الذكي للدراسة بذكاء وسرعة أكبر</p>

        <!-- صندوق الكتابة -->
        <textarea id="userInput" rows="6" 
            class="w-full p-4 border border-slate-200 rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-right resize-none"
            placeholder="ضع نص الدرس هنا، أو اكتب سؤالك..."></textarea>

        <!-- الأزرار التفاعلية -->
        <div class="flex gap-4 mb-6">
            <button onclick="processAI('summarize')" 
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-300 cursor-pointer shadow-md shadow-blue-100">
                ✨ لخص لي
            </button>
            <button onclick="processAI('solve')" 
                class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition duration-300 cursor-pointer shadow-md shadow-emerald-100">
                ❓ حل السؤال
            </button>
        </div>

        <!-- صندوق النتيجة (يظهر عند الضغط على الأزرار) -->
        <div id="resultBox" class="hidden text-right border-t border-slate-100 pt-4 animate-fade-in">
            <h3 class="text-md font-bold text-slate-700 mb-2">💡 الإجابة:</h3>
            <div id="resultText" class="text-slate-600 text-sm leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 min-h-[80px] whitespace-pre-wrap">
                جاري التفكير...
            </div>
        </div>
    </div>

    <!-- كود الـ JavaScript للتحكم بالذكاء الاصطناعي -->
    <script>
        async function processAI(action) {
            const input = document.getElementById('userInput').value;
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!input.trim()) {
                alert('الرجاء كتابة شيء أولاً!');
                return;
            }

            // إظهار صندوق النتيجة وكتابة رسالة جاري المعالجة
            resultBox.classList.remove('hidden');
            resultText.innerText = 'جاري التفكير وتحضير الإجابة... ⏳';

            // تحديد نوع الطلب بناءً على الزر
            let promptMessage = input;
            if (action === 'summarize') {
                promptMessage = "قم بتلخيص النص التالي بشكل نقاط واضحة ومنظمة ولغة عربية سليمة:\n" + input;
            } else if (action === 'solve') {
                promptMessage = "قم بحل السؤال الدراسي التالي مع الشرح خطوة بخطوة بالتفصيل:\n" + input;
            }

            // المفتاح السري الخاص بك مدمج وجاهز الآن
            const API_KEY = 'AQ.Ab8RN6KzeiEhki2Yg_m81NlzS1EotuIqVxydlfeFlVHHKPJcHA'; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptMessage }] }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    // عرض النتيجة الحقيقية القادمة من Gemini
                    resultText.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resultText.innerText = 'عذراً، حدث خطأ في استخراج الإجابة. تأكد من إعدادات المفتاح.';
                }
            } catch (error) {
                console.error(error);
                resultText.innerText = 'فشل الاتصال بالذكاء الاصطناعي. تحقق من الإنترنت أو صلاحية المفتاح.';
            }
        }
    </script>

</body>
</html>
